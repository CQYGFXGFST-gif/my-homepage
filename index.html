<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海葵的个人主页</title>
    <style>
        /* 全局样式与颜色定义 */
        :root {
            --primary-purple: #7b2cbf; /* 科技感深紫色 */
            --light-purple: #f3e8ff; /* 聊天气泡浅紫色 */
            --bg-color: #f8f9fa; /* 极浅灰色背景，衬托白色卡片 */
            --white: #ffffff;
            --text-main: #333333;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 页面主容器，适配手机与电脑 */
        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--white);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(123, 44, 191, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 100vh;
            overflow-y: auto;
        }

        /* 头部：头像与简介 */
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            border-bottom: 1px solid var(--light-purple);
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #9d4edd, var(--primary-purple));
            color: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin: 0 auto 15px;
            box-shadow: 0 4px 12px rgba(123, 44, 191, 0.3);
        }

        .name {
            margin: 0;
            font-size: 24px;
            color: var(--primary-purple);
        }

        .tagline {
            margin: 5px 0 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* 个人信息展示区 */
        .info-section {
            padding: 25px 25px 15px;
        }

        .info-card {
            background-color: #fafafa;
            border-left: 4px solid var(--primary-purple);
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .info-card p {
            margin: 5px 0;
        }

        .highlight {
            font-weight: bold;
            color: var(--primary-purple);
        }

        .resources-section {
            padding: 15px 25px;
            background: linear-gradient(135deg, rgba(123, 44, 191, 0.05) 0%, rgba(157, 78, 221, 0.05) 100%);
        }

        .resources-card {
            background-color: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(123, 44, 191, 0.06);
        }

        .resources-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--primary-purple);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .resources-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 10px;
        }

        .resource-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--white);
            border: 1px solid var(--light-purple);
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .resource-item:hover {
            border-color: var(--primary-purple);
            box-shadow: 0 2px 8px rgba(123, 44, 191, 0.1);
        }

        .resource-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .download-btn {
            background-color: var(--primary-purple);
            color: var(--white);
            border: none;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background-color: #5a189a;
            transform: scale(1.05);
        }

        /* 数字分身聊天区 */
        .chat-section {
            padding: 25px;
            background: linear-gradient(135deg, rgba(123, 44, 191, 0.03) 0%, rgba(157, 78, 221, 0.03) 100%);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            border-top: 1px solid var(--light-purple);
        }

        .chat-title {
            font-size: 17px;
            font-weight: bold;
            color: var(--primary-purple);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            background-color: var(--white);
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(123, 44, 191, 0.08);
        }

        .quick-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .question-btn {
            background-color: var(--white);
            color: var(--primary-purple);
            border: 1px solid var(--primary-purple);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .question-btn:hover {
            background-color: var(--primary-purple);
            color: var(--white);
        }

        .chat-window {
            flex-grow: 1;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            height: 250px;
            overflow-y: auto;
            padding: 15px;
            background-color: #fafafa;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .msg-ai {
            background-color: var(--light-purple);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg-user {
            background-color: var(--primary-purple);
            color: var(--white);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .copy-link-btn {
            float: right;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 6px;
            margin-left: 8px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .copy-link-btn:hover {
            opacity: 1;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex-grow: 1;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        .chat-input:focus {
            border-color: var(--primary-purple);
        }

        .send-btn {
            background-color: var(--primary-purple);
            color: var(--white);
            border: none;
            padding: 0 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background-color: #5a189a;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 头部信息 -->
        <header class="header">
            <div class="avatar">海葵</div>
            <h1 class="name">海葵</h1>
            <p class="tagline">一个正在学习用 AI 做产品的中医学生</p>
        </header>

        <!-- 个人信息展示区 -->
        <section class="info-section">
            <div class="info-card">
                <p><span class="highlight">当前状态：</span>主要在复习期末考试 📚</p>
                <p><span class="highlight">我的兴趣：</span>探索 AI 应用、热爱旅游 🌍</p>
                <p><span class="highlight">关于我：</span>希望能睡个好觉 �</p>
            </div>
        </section>

        <section class="resources-section">
            <div class="resources-card">
                <div class="resources-title">
                    <span>📚</span> 我的复习资料
                </div>
                <div class="resources-list">
                    <div class="resource-item">
                        <div class="resource-name">📖 陈皮皮针灸学习资料</div>
                        <button class="download-btn" onclick="showAcupunctureResource()">获取</button>
                    </div>
                    <div class="resource-item">
                        <div class="resource-name">📜 日语学习资料</div>
                        <button class="download-btn" onclick="showJapaneseResource()">获取</button>
                    </div>
                    <div class="resource-item">
                        <div class="resource-name">📚 中医十三五教材大全</div>
                        <button class="download-btn" onclick="showTextbookResource()">获取</button>
                    </div>
                    <div class="resource-item">
                        <div class="resource-name">🩺 中医诊断学</div>
                        <button class="download-btn" onclick="showDiagnosticsResource()">获取</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 数字分身聊天区 -->
        <section class="chat-section">
            <div class="chat-title">
                <span>💬</span> 和我聊天吧！
            </div>
            
            <!-- 快捷提问 -->
            <div class="quick-questions">
                <button class="question-btn" onclick="sendQuickQuestion('你现在在做什么？')">你现在在做什么？</button>
                <button class="question-btn" onclick="sendQuickQuestion('你有哪些资料？')">你有哪些资料？</button>
                <button class="question-btn" onclick="sendQuickQuestion('怎么联系你获得资料？')">怎么联系你获得资料？</button>
            </div>

            <!-- 聊天窗口 -->
            <div class="chat-window" id="chatWindow">
                <div class="message msg-ai">你好！我是海葵的数字分身。我是一个中医医学生，最近正在整理学习资料和复习期末。有什么想问我的吗？</div>
            </div>

            <!-- 输入区 -->
            <div class="input-area">
                <input type="text" id="userInput" class="chat-input" placeholder="输入你想问的问题..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">发送</button>
            </div>
        </section>
    </div>

    <script>
        // 数字分身的知识库与逻辑
        const knowledgeBase = {
            "你现在在做什么？": "我现在主要在复习期末考试！同时也在搭建这个个人主页，并整理和收集各种学习资料与笔记。",
            "你有哪些资料？": "我目前有如下资料：<br>1.中医十三五教材大全<br>2.日语学习资料<br>3.陈皮皮针灸学习资料<br>4.中医诊断学<br><br>如果你需要以上任何资料，点击获得资料或者对我发送资料名称即可获取网盘链接~",
            "怎么联系你获得资料？": "点击获取按钮或输入资料名称即可获取~",
            "资料": "我目前有如下资料：<br>1.中医十三五教材大全<br>2.日语学习资料<br>3.陈皮皮针灸学习资料<br>4.中医诊断学<br><br>如果你需要以上任何资料，点击获得资料或者对我发送资料名称即可获取网盘链接~",
            "获取资料": "我目前有如下资料：<br>1.中医十三五教材大全<br>2.日语学习资料<br>3.陈皮皮针灸学习资料<br>4.中医诊断学<br><br>如果你需要以上任何资料，点击获得资料或者对我发送资料名称即可获取网盘链接~",
            "考试好累": "是的！！！！除了学习什么都好玩",
            "不想学习": "我也是，能不能快点放假",
            "你好": "早上好中午好晚上好，请问有什么可以帮到你？",
            "我喜欢你": "你是谁"
        };
        
        let lastQuestion = '';

        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');

        function appendMessage(text, sender, linkToCopy = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender === 'user' ? 'msg-user' : 'msg-ai'}`;
            msgDiv.innerHTML = text;
            
            if (linkToCopy) {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-link-btn';
                copyBtn.innerHTML = '📋';
                copyBtn.title = '复制链接';
                copyBtn.onclick = function() {
                    copyToClipboard(linkToCopy);
                    copyBtn.innerHTML = '✓';
                    setTimeout(() => {
                        copyBtn.innerHTML = '📋';
                    }, 2000);
                };
                msgDiv.appendChild(copyBtn);
            }
            
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function getAIResponse(userText) {
            // 简单匹配知识库
            for (let question in knowledgeBase) {
                if (userText.includes(question) || question.includes(userText)) {
                    return knowledgeBase[question];
                }
            }
            // 默认回复
            return "这个问题我还不太清楚诶。我是一个中医医学生，最近正在复习期末和整理资料，也许你可以问问我关于中医学习、AI应用或者知识整理方面的问题？";
        }

        function processMessage(text) {
            if (!text.trim()) return;
            
            // 显示用户消息
            appendMessage(text, 'user');
            userInput.value = '';

            // 模拟 AI 思考延迟 (500毫秒)
            setTimeout(() => {
                // 检查是否是蛋黄酱（需要先问过我喜欢你）
                if (lastQuestion.includes('我喜欢你') && text.includes('蛋黄酱')) {
                    appendMessage('抓住你啦！', 'ai');
                    lastQuestion = '';
                    return;
                }
                
                // 检查是否是资料名称（模糊匹配）
                if (text.includes('十三五') || text.includes('教材大全') || (text.includes('中医') && text.includes('教材'))) {
                    showTextbookResource();
                    return;
                }
                if (text.includes('日语')) {
                    showJapaneseResource();
                    return;
                }
                if (text.includes('陈皮皮') || text.includes('针灸')) {
                    showAcupunctureResource();
                    return;
                }
                if (text.includes('诊断学')) {
                    showDiagnosticsResource();
                    return;
                }
                
                // 否则使用知识库回复
                const response = getAIResponse(text);
                appendMessage(response, 'ai');
                
                // 记录用户的问题（用于后续蛋黄酱判断）
                lastQuestion = text;
            }, 500);
        }

        function sendMessage() {
            processMessage(userInput.value);
        }

        function sendQuickQuestion(text) {
            processMessage(text);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function showContactInfo() {
            processMessage('怎么联系你获得资料？');
        }

        function downloadFile(filename) {
            const link = document.createElement('a');
            link.href = filename;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function showDiagnosticsResource() {
            const baiduLink = 'https://pan.baidu.com/s/1ZbNh3WyclPh9Qow2JM1PKA?pwd=i5ib';
            const responseText = '通过网盘分享的文件：学霸笔记—中医诊断学.pdf等2个文件<br><br>链接: <a href="' + baiduLink + '" target="_blank">' + baiduLink + '</a><br>提取码: i5ib';
            appendMessage(responseText, 'ai', baiduLink);
        }

        function showAcupunctureResource() {
            const baiduLink = 'https://pan.baidu.com/s/10uPD8NA9kMAz2aIC4LmXiA?pwd=fftu';
            const responseText = '通过网盘分享的文件：陈皮皮针灸资料分享<br><br>链接: <a href="' + baiduLink + '" target="_blank">' + baiduLink + '</a><br>提取码: fftu';
            appendMessage(responseText, 'ai', baiduLink);
        }

        function showJapaneseResource() {
            const baiduLink = 'https://pan.baidu.com/s/13yDQEjHjZ7VLYsbY07xTLg?pwd=vsu4';
            const responseText = '通过网盘分享的文件：冲鸭日语<br><br>链接: <a href="' + baiduLink + '" target="_blank">' + baiduLink + '</a><br>提取码: vsu4';
            appendMessage(responseText, 'ai', baiduLink);
        }

        function showTextbookResource() {
            const baiduLink = 'https://pan.baidu.com/s/1Pe14ngMKFVvOtyZYF8sUnQ?pwd=bqs2';
            const responseText = '通过网盘分享的文件：中医药十三五教材<br><br>链接: <a href="' + baiduLink + '" target="_blank">' + baiduLink + '</a><br>提取码: bqs2';
            appendMessage(responseText, 'ai', baiduLink);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(function() {
                console.log('链接已复制到剪贴板');
            }).catch(function(err) {
                console.error('复制失败:', err);
            });
        }
    </script>
</body>
</html>
