<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海葵的个人主页</title>
    <style>
        /* 修改开始：珊瑚海洋风配色 */
        :root {
            --primary-blue: #4f8cff; /* 海水蓝 - 主色 */
            --coral-orange: #ff9b6a; /* 珊瑚橘 - 点缀 */
            --coral-light: #ffb38a; /* 浅珊瑚 - 辅助 */
            --bg-color: #f6fbff; /* 浅海白 */
            --white: #ffffff; /* 白色卡片 */
            --text-main: #2b3a4a; /* 深海蓝灰 */
            --text-secondary: #5a7085; /* 浅海灰蓝 */
            --border-color: #e6f0f7; /* 海雾蓝边框 */
            --light-bg: #fafdfe; /* 浅色背景 */
            --gradient-text: linear-gradient(135deg, #4f8cff 0%, #ff9b6a 100%); /* 蓝珊瑚渐变文字 */
            --gradient-btn: linear-gradient(135deg, #4f8cff 0%, #ff9b6a 100%); /* 蓝珊瑚渐变按钮 */
        }
        /* 修改结束 */

        /* 修改开始：珊瑚海洋背景 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, #e8f4fb 0%, #f0f8fe 30%, #f6fbff 60%, #fff8f5 85%, #ffffff 100%);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        /* 修改结束 */

        /* 修改开始：卡片UI优化 - 珊瑚海洋风格 */
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(79, 140, 255, 0.08), 0 2px 8px rgba(79, 140, 255, 0.04);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 100vh;
            overflow-y: auto;
        }
        
        .container:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(79, 140, 255, 0.12), 0 2px 8px rgba(255, 155, 106, 0.04);
        }
        /* 修改结束 */

        /* 头部：头像与简介 */
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            border-bottom: 1px solid var(--light-purple);
            position: relative;
        }

        /* ===== 漂浮状态气泡 ===== */
        .status-bubble {
            position: absolute;
            top: 20px;
            left: 58%;
            
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(10px);

            color: #5a7085;
            font-size: 13px;
            font-weight: 500;

            padding: 10px 16px;

            border-radius: 999px;

            border: 1px solid rgba(79,140,255,0.12);

            box-shadow:
                0 4px 14px rgba(79,140,255,0.10),
                0 0 10px rgba(79,140,255,0.06);

            white-space: nowrap;

            animation:
                bubbleFloat 4s ease-in-out infinite,
                bubbleBreath 3.5s ease-in-out infinite;

            transform-origin: center;

            z-index: 10;
        }

        .status-bubble::after {
            content: "";

            position: absolute;

            left: -6px;
            top: 18px;

            width: 12px;
            height: 12px;

            background: rgba(255,255,255,0.72);

            border-left: 1px solid rgba(79,140,255,0.08);
            border-bottom: 1px solid rgba(79,140,255,0.08);

            transform: rotate(45deg);

            backdrop-filter: blur(10px);
        }

        @keyframes bubbleFloat {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-6px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @keyframes bubbleBreath {
            0% {
                scale: 0.96;
            }

            50% {
                scale: 1;
            }

            100% {
                scale: 0.96;
            }
        }

        @media (max-width: 768px) {
            .status-bubble {
                left: 52%;
                top: 18px;

                font-size: 12px;

                padding: 8px 14px;

                max-width: 160px;

                white-space: normal;
            }
        }

        /* 修改开始：头像区域优化 - 珊瑚海洋风格 */
        .avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 15px;
            box-shadow: 0 4px 16px rgba(79, 140, 255, 0.12), 0 2px 8px rgba(255, 155, 106, 0.08);
            border: 3px solid rgba(255, 255, 255, 0.9);
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: #4f8cff;
            background: linear-gradient(135deg, #4f8cff 0%, #ff9b6a 100%);
        }
        
        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .avatar:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79, 140, 255, 0.18), 0 2px 8px rgba(255, 155, 106, 0.12);
        }

        .bubble {
            position: fixed;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;

            background:
                radial-gradient(circle at 30% 30%,
                rgba(255,255,255,0.9) 0%,
                rgba(255,255,255,0.35) 18%,
                rgba(120,190,255,0.18) 45%,
                rgba(79,140,255,0.12) 100%);

            border: 1px solid rgba(255,255,255,0.45);

            backdrop-filter: blur(6px);

            box-shadow:
                inset 0 0 12px rgba(255,255,255,0.45),
                0 4px 18px rgba(79,140,255,0.22);

            color: #2b3a4a;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            line-height: 1.3;

            pointer-events: none;
            z-index: 9999;

            animation: oceanBubbleFloat 3.2s ease-out forwards;
        }

        .bubble::before {
            content: '';
            position: absolute;

            width: 18px;
            height: 18px;

            border-radius: 50%;

            background: rgba(255,255,255,0.85);

            top: 12px;
            left: 16px;

            filter: blur(1px);

            opacity: 0.9;
        }

        @keyframes oceanBubbleFloat {
            0% {
                opacity: 0;
                transform:
                    translateY(0)
                    scale(0.4);
            }

            15% {
                opacity: 1;
            }

            50% {
                transform:
                    translateY(-60px)
                    scale(1);
            }

            100% {
                opacity: 0;
                transform:
                    translateY(-140px)
                    scale(1.15);
            }
        }
        /* 修改结束 */

        /* ===== 海底背景装饰 ===== */

        body {
            position: relative;
            overflow-x: hidden;
        }

        /* 整体海洋柔光 */
        body::before {
            content: "";

            position: fixed;
            inset: 0;

            pointer-events: none;

            background:
                radial-gradient(circle at 20% 30%, rgba(79,140,255,0.08), transparent 30%),
                radial-gradient(circle at 80% 20%, rgba(255,155,106,0.08), transparent 25%),
                radial-gradient(circle at 50% 80%, rgba(79,140,255,0.05), transparent 30%);

            z-index: -3;
        }

        /* 左侧珊瑚 */
        body::after {
            content: "";

            position: fixed;

            left: 0;
            bottom: 0;

            width: 260px;
            height: 420px;

            background-image: url("data:image/svg+xml,%3Csvg width='260' height='420' viewBox='0 0 260 420' xmlns='http://www.w3.org/2000/svg'%3E%3Cg opacity='0.16'%3E%3Cpath d='M60 420C60 360 80 330 75 280C70 240 40 220 48 180C56 140 80 120 78 70' stroke='%23ffb38a' stroke-width='10' stroke-linecap='round' fill='none'/%3E%3Cpath d='M90 420C90 350 120 310 115 250C110 210 90 170 105 120' stroke='%234f8cff' stroke-width='9' stroke-linecap='round' fill='none'/%3E%3Cpath d='M140 420C140 360 170 320 168 250C165 200 150 160 180 110' stroke='%23ffd0ba' stroke-width='8' stroke-linecap='round' fill='none'/%3E%3C/g%3E%3C/svg%3E");

            background-repeat: no-repeat;
            background-size: contain;

            pointer-events: none;

            z-index: -2;
        }

        /* 右侧珊瑚 */
        .coral-right {
            content: "";

            position: fixed;

            right: 0;
            bottom: 0;

            width: 260px;
            height: 420px;

            background-image: url("data:image/svg+xml,%3Csvg width='260' height='420' viewBox='0 0 260 420' xmlns='http://www.w3.org/2000/svg'%3E%3Cg opacity='0.15'%3E%3Cpath d='M200 420C200 360 180 320 185 270C190 230 220 200 210 150C200 110 180 90 182 50' stroke='%234f8cff' stroke-width='10' stroke-linecap='round' fill='none'/%3E%3Cpath d='M160 420C160 340 130 300 135 240C140 200 150 160 120 100' stroke='%23ffb38a' stroke-width='9' stroke-linecap='round' fill='none'/%3E%3Cpath d='M110 420C110 360 80 320 85 250C90 210 100 170 70 130' stroke='%23ffd0ba' stroke-width='8' stroke-linecap='round' fill='none'/%3E%3C/g%3E%3C/svg%3E");

            background-repeat: no-repeat;
            background-size: contain;

            pointer-events: none;

            z-index: -2;
        }

        /* 漂浮小泡泡 */
        .bubbles-bg {
            content: "";

            position: fixed;
            inset: 0;

            pointer-events: none;

            background-image:
                radial-gradient(circle, rgba(255,255,255,0.7) 2px, transparent 3px),
                radial-gradient(circle, rgba(255,255,255,0.5) 1.5px, transparent 2px),
                radial-gradient(circle, rgba(79,140,255,0.15) 2px, transparent 3px);

            background-size:
                180px 180px,
                240px 240px,
                320px 320px;

            background-position:
                20% 30%,
                70% 20%,
                40% 80%;

            opacity: 0.5;

            z-index: -1;
        }

        /* 手机端减弱 */
        @media (max-width: 768px) {
            body::after,
            .coral-right {
                opacity: 0.45;
                width: 160px;
            }

            .bubbles-bg {
                opacity: 0.25;
            }
        }

        .name {
            margin: 0;
            font-size: 26px;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            margin: 5px 0 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* 个人信息展示区 */
        .info-section {
            padding: 25px 15px 15px;
            display: flex;
            justify-content: center;
        }

        .info-card {
            background-color: var(--light-bg);
            border-left: 4px solid var(--primary-blue);
            border-right: 4px solid var(--primary-blue);
            padding: 20px 22px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 14px;
            width: 90%;
            max-width: 500px;
            line-height: 1.8;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: center;
        }

        .info-card p {
            margin: 0;
            letter-spacing: 0.3px;
        }

        .highlight {
            font-weight: 600;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .resources-section {
            padding: 15px 25px;
            background: var(--light-bg);
        }

        .resources-card {
            background-color: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(79, 140, 255, 0.06);
        }

        .resources-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-blue);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .resources-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 10px;
        }

        .resource-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--white);
            border: 1px solid var(--border-color);
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .resource-item:hover {
            border-color: var(--coral-orange);
            box-shadow: 0 2px 8px rgba(255, 155, 106, 0.08);
            transform: translateY(-1px);
        }

        .resource-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 修改开始：按钮风格 - 珊瑚海洋渐变 */
        .download-btn {
            background: var(--gradient-btn);
            color: var(--white);
            border: none;
            padding: 8px 16px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .download-btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }
        /* 修改结束 */

        /* 数字分身聊天区 */
        .chat-section {
            padding: 25px;
            background: var(--light-bg);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            border-top: 1px solid var(--border-color);
        }

        .chat-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--primary-blue);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            background-color: var(--white);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(79, 124, 255, 0.06);
        }

        .quick-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        /* 修改开始：快捷提问按钮 - 珊瑚海洋渐变 */
        .question-btn {
            background: rgba(79, 140, 255, 0.06);
            color: var(--primary-blue);
            border: 1px solid rgba(79, 140, 255, 0.15);
            padding: 8px 14px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .question-btn:hover {
            background: var(--gradient-btn);
            color: var(--white);
            border-color: transparent;
            transform: translateY(-1px);
        }
        /* 修改结束 */

        .chat-window {
            flex-grow: 1;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            height: 250px;
            overflow-y: auto;
            padding: 15px;
            background-color: var(--white);
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }

        .msg-wrapper.user {
            align-items: flex-end;
        }

        .msg-wrapper.ai {
            align-items: flex-start;
        }

        .message-time {
            font-size: 11px;
            color: rgba(90, 112, 133, 0.6);
            margin-top: 4px;
            padding: 0 6px;
            user-select: none;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        /* 修改开始：聊天气泡优化 - 珊瑚海洋风格 */
        .msg-ai {
            background: rgba(79, 140, 255, 0.06);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-user {
            background: linear-gradient(135deg, var(--primary-blue) 0%, #6fa8ff 100%);
            color: var(--white);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        /* 修改结束 */

        .copy-link-btn {
            float: right;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 6px;
            margin-left: 8px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .copy-link-btn:hover {
            opacity: 1;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex-grow: 1;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        .chat-input:focus {
            border-color: var(--primary-blue);
        }

        /* 修改开始：发送按钮 - 珊瑚海洋渐变 */
        .send-btn {
            background: var(--gradient-btn);
            color: var(--white);
            border: none;
            padding: 0 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        /* 版权说明区域 */
        .copyright-section {
            padding: 20px 30px 30px;
            text-align: center;
            position: relative;
        }

        .copyright-section p {
            font-size: 12px;
            color: rgba(79, 100, 120, 0.65);
            line-height: 1.7;
            margin: 0;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
        }

        .contact-link {
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .contact-link:hover {
            text-shadow: 0 0 12px rgba(79, 140, 255, 0.5);
        }

        .copyright-bubble {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%) scale(0.8) translateY(10px);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 16px;
            border: 1px solid rgba(79, 140, 255, 0.15);
            box-shadow: 0 4px 12px rgba(79, 140, 255, 0.15);
            font-size: 12px;
            color: #2b3a4a;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
            white-space: nowrap;
        }

        .copyright-bubble.visible {
            opacity: 1;
            transform: translateX(-50%) scale(1) translateY(0);
            pointer-events: auto;
        }

        /* 修改结束 */
    </style>
</head>
<body>

    <!-- 右侧珊瑚装饰 -->
    <div class="coral-right"></div>

    <!-- 漂浮小泡泡背景 -->
    <div class="bubbles-bg"></div>

    <div class="container">
        <!-- 头部信息 -->
        <header class="header">
            <div class="avatar" onclick="spawnBubbles(event)">
            <img src="avatar.png" class="avatar-img" alt="海葵" onerror="this.style.display='none'">
        </div>

            <div class="status-bubble">
                海葵今天更新了
            </div>

            <h1 class="name">海葵</h1>
            <p class="tagline">只是一只橘色海葵</p>
        </header>

        <!-- 个人信息展示区 -->
        <section class="info-section">
            <div class="info-card">
                <p><span class="highlight">当前状态：</span>激情狩猎芝士中</p>
                <p><span class="highlight">我的兴趣：</span>随洋流漂浮到世界各地</p>
                <p><span class="highlight">关于我：</span>是纯肉食动物</p>
            </div>
        </section>

        <section class="resources-section">
            <div class="resources-card">
                <div class="resources-title">
                    <span>�</span>海葵的珊瑚丛
                </div>
                <div class="resources-list">
                    <div class="resource-item">
                        <div class="resource-name">📖 陈皮皮针灸学习资料</div>
                        <button class="download-btn" onclick="showAcupunctureResource()">获取</button>
                    </div>
                    <div class="resource-item">
                        <div class="resource-name">📜 日语学习资料</div>
                        <button class="download-btn" onclick="showJapaneseResource()">获取</button>
                    </div>
                    <div class="resource-item">
                        <div class="resource-name">📚 中医十三五教材大全</div>
                        <button class="download-btn" onclick="showTextbookResource()">获取</button>
                    </div>
                    <div class="resource-item">
                        <div class="resource-name">🩺 中医诊断学</div>
                        <button class="download-btn" onclick="showDiagnosticsResource()">获取</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 数字分身聊天区 -->
        <section class="chat-section">
            <div class="chat-title">
                <span>�</span> 和海葵互动（海葵没有记忆，离开后痕迹会被大海冲刷）
            </div>
            
            <!-- 快捷提问 -->
            <div class="quick-questions">
                <button class="question-btn" onclick="sendQuickQuestion('你现在在做什么？')">你现在在做什么？</button>
                <button class="question-btn" onclick="sendQuickQuestion('你有哪些资料？')">你有哪些资料？</button>
                <button class="question-btn" onclick="sendQuickQuestion('怎么联系你获得资料？')">怎么获得资料？</button>
            </div>

            <!-- 聊天窗口 -->
            <div class="chat-window" id="chatWindow">
                <div class="message msg-ai">海葵可以帮到你什么？</div>
            </div>

            <!-- 输入区 -->
            <div class="input-area">
                <input type="text" id="userInput" class="chat-input" placeholder="触碰海葵..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">发送</button>
            </div>
        </section>

        <!-- 版权说明区域 -->
        <footer class="copyright-section">
            <div class="copyright-bubble" id="copyrightBubble">海葵的邮箱还在注册中</div>

    <script>
        // 数字分身的知识库与逻辑
        const knowledgeBase = {

            "怎么联系你获得资料？": "点击获取按钮或输入资料名称即可获取~",
            "资料": "我目前有如下资料：<br>1.中医十三五教材大全<br>2.日语学习资料<br>3.陈皮皮针灸学习资料<br>4.中医诊断学<br><br>如果你需要以上任何资料，点击获得资料或者对我发送资料名称即可获取网盘链接~",
            "获取资料": "我目前有如下资料：<br>1.中医十三五教材大全<br>2.日语学习资料<br>3.陈皮皮针灸学习资料<br>4.中医诊断学<br><br>如果你需要以上任何资料，点击获得资料或者对我发送资料名称即可获取网盘链接~",
            "考试好累": "考完试就可以和小丑鱼一起玩啦",

        let lastQuestion = '';
        let unknownCount = 0;

        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');

        function appendMessage(text, sender, linkToCopy = null) {
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${sender === 'user' ? 'user' : 'ai'}`;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender === 'user' ? 'msg-user' : 'msg-ai'}`;
            msgDiv.innerHTML = text;
            
            if (linkToCopy) {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-link-btn';
                copyBtn.innerHTML = '📋';
                copyBtn.title = '复制链接';
                copyBtn.onclick = function() {
                    copyToClipboard(linkToCopy);
                    copyBtn.innerHTML = '✓';
                    setTimeout(() => {
                        copyBtn.innerHTML = '📋';
                    }, 2000);
                };
                msgDiv.appendChild(copyBtn);
            }
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            const now = new Date();
            const timeString = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            timeDiv.textContent = timeString;
            
            wrapper.appendChild(msgDiv);
            wrapper.appendChild(timeDiv);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function isSimilar(str1, str2) {
            const s1 = str1.toLowerCase().replace(/[，。！？、\s]/g, '');
            const s2 = str2.toLowerCase().replace(/[，。！？、\s]/g, '');
            if (!s1 || !s2) return false;
            const longer = s1.length > s2.length ? s1 : s2;
            const shorter = s1.length > s2.length ? s2 : s1;
            const longerLength = longer.length;
            if (longerLength === 0) return true;
            const editDistance = levenshteinDistance(longer, shorter);
            return (longerLength - editDistance) / longerLength > 0.6;
        }

        function levenshteinDistance(s1, s2) {
            const costs = [];
            for (let i = 0; i <= s1.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= s2.length; j++) {
                    if (i === 0) {
                        costs[j] = j;
                    } else if (j > 0) {
                        let newValue = costs[j - 1];
                        if (s1.charAt(i - 1) !== s2.charAt(j - 1)) {
                            newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                        }
                        costs[j - 1] = lastValue;
                        lastValue = newValue;
                    }
                }
                if (i > 0) costs[s2.length] = lastValue;
            }
            return costs[s2.length];
        }

        function isKnownQuestion(userText) {
            for (let question in knowledgeBase) {
                if (userText.includes(question) || question.includes(userText)) {
                    return true;
                }
            }
            if (userText.includes('十三五') || userText.includes('教材大全') || (userText.includes('中医') && userText.includes('教材'))) {
                return true;
            }
            if (userText.includes('日语')) return true;
            if (userText.includes('陈皮皮') || userText.includes('针灸')) return true;
            if (userText.includes('诊断学')) return true;
            if (lastQuestion.includes('我喜欢你') && userText.includes('蛋黄酱')) return true;
            return false;
        }

        function getAIResponse(userText) {
            for (let question in knowledgeBase) {
                if (userText.includes(question) || question.includes(userText)) {
                    const response = knowledgeBase[question];
                    if (Array.isArray(response)) {
                        return response[Math.floor(Math.random() * response.length)];
                    }
                    return response;
                }
            }
            return null;
        }

        function processMessage(text) {
            if (!text.trim()) return;
            
            appendMessage(text, 'user');
            userInput.value = '';

            setTimeout(() => {
                // 1. 重复问题检测（最高优先级）
                if (lastQuestion && isSimilar(text, lastQuestion)) {
                    appendMessage('珊瑚记忆卡住了', 'ai');
                    lastQuestion = text;
                    return;
                }

                // ① 攻击类（最高优先级）
                if ((text.includes('吃') && text.includes('你')) || (text.includes('吃') && text.includes('海葵'))) {
                    const attackResponses = ['海葵不允许。', '海葵是有毒的。', '小丑鱼快来啊！'];
                    appendMessage(attackResponses[Math.floor(Math.random() * attackResponses.length)], 'ai');
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // ② 情绪/关系类
                if (text.includes('爱你') || text.includes('喜欢你')) {
                    appendMessage('海葵感受到了一阵温暖的洋流。', 'ai');
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // ③ 食物/吃类（排除攻击类）
                if (text.includes('吃什么') || (text.includes('吃') && !text.includes('你'))) {
                    appendMessage('随便飘来的都吃一点，比如信息、灵感，还有你刚刚说的话。', 'ai');
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // ④ 学习/状态类
                if (text.includes('不想学习') || text.includes('学不动') || text.includes('好累')) {
                    const statusResponses = [
                        ['是不是有点累了呀。', '风浪变大了。', '可以先漂一会儿。'],
                        ['你搁浅了吗。', '潮汐暂时退了。', '等涨潮了再继续游吧。']
                    ];
                    const responseSet = statusResponses[Math.floor(Math.random() * statusResponses.length)];
                    responseSet.forEach((msg, index) => {
                        setTimeout(() => appendMessage(msg, 'ai'), index * 400);
                    });
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // ⑤ 资料类
                if (text.includes('十三五') || text.includes('教材大全') || (text.includes('中医') && text.includes('教材'))) {
                    showTextbookResource();
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }
                if (text.includes('日语')) {
                    showJapaneseResource();
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }
                if (text.includes('陈皮皮') || text.includes('针灸')) {
                    showAcupunctureResource();
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }
                if (text.includes('诊断学')) {
                    showDiagnosticsResource();
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // 蛋黄酱彩蛋（放在资料类之后，知识库之前）
                if (lastQuestion.includes('我喜欢你') && text.includes('蛋黄酱')) {
                    appendMessage('抓住你啦！', 'ai');
                    lastQuestion = '';
                    unknownCount = 0;
                    return;
                }

                // ===== 海葵人格扩展 =====

                // 小海葵喜欢吃什么
                if (
                    (text.includes('海葵') || text.includes('小海葵') || text.includes('葵葵')) &&
                    (
                        text.includes('吃什么') ||
                        text.includes('喜欢吃') ||
                        text.includes('吃啥')
                    )
                ) {
                    appendMessage('随便飘来的都吃一点，比如信息、灵感，还有你刚刚说的话。', 'ai');
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // 不想学习
                if (
                    text.includes('不想学习') ||
                    text.includes('不想复习') ||
                    text.includes('学不动') ||
                    text.includes('不想看书')

                    const lazyReplies = [
                        '那就先漂一会儿，等有力气了再游。',
                        '海水会把累掉的人慢慢送去岸边。',
                        '（海葵伸出触手拍了拍你）'
                    ];

                    appendMessage(
                        lazyReplies[Math.floor(Math.random() * lazyReplies.length)],
                        'ai'
                    );

                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // 爱你
                if (
                    text.includes('爱你') ||
                    text.includes('喜欢你') ||
                    text.includes('想你')
                ) {
                    appendMessage('海葵感受到了一阵温暖的洋流。', 'ai');
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // 吃掉海葵（优先级必须高于“吃什么”）
                if (
                    (
                        text.includes('吃掉你') ||
                        text.includes('吃你') ||
                        text.includes('可以吃掉你') ||
                        text.includes('想吃你')
                    ) &&
                    (text.includes('海葵') || text.includes('小海葵') || text.includes('葵'))
                ) {
                    const eatReplies = [
                        '海葵不允许。',
                        '海葵是有毒的。',
                        '靠近海葵需要谨慎。'
                    ];

                    appendMessage(
                        eatReplies[Math.floor(Math.random() * eatReplies.length)],
                        'ai'
                    );

                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // 身体不舒服
                if (
                    (
                        text.includes('不舒服') ||
                        text.includes('生病') ||
                        text.includes('难受') ||
                        text.includes('头疼') ||
                        text.includes('胃疼')
                    ) &&
                    (
                        text.includes('药') ||
                        text.includes('怎么办') ||
                        text.includes('吃什么')
                    )
                ) {
                    appendMessage('海葵建议你去看人医。', 'ai');
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // 中基资料
                if (
                    text.includes('中基') ||
                    text.includes('中医基础')
                ) {
                    appendMessage('海葵还没吃到', 'ai');
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // 你在哪里
                if (
                    text.includes('你在哪') ||
                    text.includes('你在哪里') ||
                    text.includes('住在哪')
                ) {
                    appendMessage('海葵在海里。', 'ai');
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // 单纯喊海葵名字
                if (
                    text.trim() === '海葵' ||
                    text.trim() === '海葵海葵' ||
                    text.trim() === '小海葵' ||
                    text.trim() === '葵葵酱' ||
                    text.trim() === '葵葵'
                ) {
                    appendMessage('（海葵伸出触手向你打了个招呼）', 'ai');
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // 海葵会不会溺水
                if (
                    text.includes('海葵') &&
                    (
                        text.includes('淹死') ||
                        text.includes('溺死')
                    )
                ) {
                    appendMessage('海葵没想到人类会问这种问题...', 'ai');
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // 海葵是植物还是动物
                if (
                    (
                        text.includes('植物') ||
                        text.includes('动物')
                    ) &&
                    text.includes('海葵')
                ) {
                    appendMessage('海葵虽然有个外号叫“海底太阳花”但实际上是纯肉食动物。', 'ai');
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // 知识库匹配
                const response = getAIResponse(text);
                if (response) {
                    appendMessage(response, 'ai');
                    lastQuestion = text;
                    unknownCount = 0;
                    return;
                }

                // ⑥ fallback未知（状态机）
                unknownCount++;
                if (unknownCount === 1) {
                    appendMessage('你知道吗...海葵是没有大脑的...', 'ai');
                } else {
                    appendMessage('被海水冲走了——', 'ai');
                }
                lastQuestion = text;
            }, 500);
        }

                bubble.textContent = bubbleContents[Math.floor(Math.random() * bubbleContents.length)];
                
                const size = 60 + Math.floor(Math.random() * 31);
                const x = event.clientX + (Math.random() - 0.5) * 60;
                const y = event.clientY;
                
                bubble.style.left = x + 'px';
                bubble.style.top = y + 'px';
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.animationDuration = (2.8 + Math.random() * 1.5) + 's';
                bubble.style.animationDelay = (Math.random() * 0.4) + 's';
                
                document.body.appendChild(bubble);
                
                setTimeout(() => {
                    bubble.remove();
                }, 4000);
            }
        }
